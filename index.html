
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOIDY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-bg: #02040a;
            --accent-cyan: #22d3ee;
            --accent-blue: #1e40af;
            --frost-white: #f8fafc;
            --rayman-ease: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--void-bg);
            color: var(--frost-white);
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            margin: 0;
            position: fixed;
            overscroll-behavior: none;
        }

        #root {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-syncopate { font-family: 'Syncopate', sans-serif; }
        
        .bg-void {
            background-color: var(--void-bg);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(30, 64, 175, 0.08) 0%, transparent 70%),
                radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.02) 0.5px, transparent 0);
            background-size: 100% 100%, 48px 48px;
        }

        .nebula-overlay {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 80% 20%, rgba(34, 211, 238, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(30, 64, 175, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
            will-change: opacity;
        }

        .glass {
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(34, 211, 238, 0.1);
        }

        .rayman-card {
            transition: transform 0.3s var(--rayman-ease), border-color 0.2s ease, box-shadow 0.2s ease;
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            will-change: transform, border-color;
        }
        
        .rayman-card:hover {
            transform: scale(1.02) translateY(-5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.1);
        }

        @keyframes pulse-frost {
            0%, 100% { opacity: 0.5; filter: brightness(1); }
            50% { opacity: 1; filter: brightness(1.3); }
        }

        .animate-pulse-frost { animation: pulse-frost 3s ease-in-out infinite; }

        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.2); border-radius: 10px; }

        @keyframes neural-sync {
          0% { opacity: 0; }
          100% { opacity: 1; }
        }
        .animate-neural-sync {
          animation: neural-sync 0.05s linear forwards;
          will-change: opacity;
        }

        @keyframes game-card-entry {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-game-card-entry {
            animation: game-card-entry 0.1s ease-out backwards;
        }

        @keyframes slideInFromLeft {
            from { transform: translateX(-10%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .slide-in-from-left {
            animation: slideInFromLeft 0.15s ease-out forwards;
        }

        .state-transition-container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            will-change: opacity;
            animation: fadeIn 0.05s linear forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes highlight-glow {
          0% { box-shadow: 0 0 0px transparent; border-color: rgba(255,255,255,0.05); }
          50% { box-shadow: 0 0 20px rgba(34, 211, 238, 0.4); border-color: rgba(34, 211, 238, 0.6); }
          100% { box-shadow: 0 0 0px transparent; border-color: rgba(255,255,255,0.05); }
        }
        .highlight-message {
          animation: highlight-glow 2s ease-out;
        }
    </style>

<link rel="stylesheet" href="index.css">
</head>
<body class="bg-void">
    <div class="nebula-overlay"></div>
    <div id="root"></div>
<script type="module" src="index.tsx"></script>
</body>
</html>
